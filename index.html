<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Phantasos AR MVP</title>
  <meta name="description" content="Minimal MindAR image tracking MVP." />
  <link rel="icon"
    href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" fill="%2306111c"/><circle cx="16" cy="16" r="9" fill="%238ff2d8"/></svg>' />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .hud {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-size: 14px;
      line-height: 1.4;
    }

    .hud a {
      color: #8ff2d8;
    }
  </style>
</head>

<body>
  <div class="hud">
    Point the camera at the Manifiesto logo.
    <a href="/assets/targets/Manifiesto-logo.jpeg" target="_blank" rel="noreferrer">Open Manifiesto logo</a>
  </div>

  <a-scene mindar-image="imageTargetSrc: /assets/targets/Manifiesto-logo.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <a-asset-item id="coffee-cup" src="/assets/models/base_coffee_cup/scene.gltf"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- animation="property: rotation; to: 90 360 0; loop: true; dur: 2400" -->
      <a-gltf-model src="#coffee-cup" position="0 0 0.03" rotation="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>
  </a-scene>
</body>

</html>
